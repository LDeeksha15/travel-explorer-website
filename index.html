<!DOCTYPE html>
<html>
<head>
  <title>Travel Explorer | Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('loginbackground.jpeg');
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      width: 350px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      text-align: center;
    }

    input {
      width: 92%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .password-container {
      position: relative;
    }

    .eye-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Travel Explorer</h2>

    <form onsubmit="return loginCheck()">

      <input type="text"
             id="username"
             placeholder="Username"
             required>

      <div class="password-container">
        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <span class="eye-icon"
              onclick="togglePassword()">👁️</span>
      </div>

      <button type="submit">Login</button>

    </form>
  </div>

  <script>
    localStorage.removeItem("loggedInUser");

    // If already logged in, go to home page
    if (localStorage.getItem("loggedInUser")) {
      window.location.href = "home.html";
    }

    function loginCheck() {

      const fixedUsername = "Deeksha";
      const fixedPassword = "1234";

      const username =
        document.getElementById("username").value;

      const password =
        document.getElementById("password").value;

      if (username === fixedUsername &&
          password === fixedPassword) {

        localStorage.setItem(
          "loggedInUser",
          username
        );

        alert(
          "Welcome " +
          username +
          " \nLogin successful!"
        );

        window.location.href = "home.html";

      } else {

        alert(
          "Incorrect username or password ❌"
        );

      }

      return false;
    }

    function togglePassword() {

      const passwordField =
        document.getElementById("password");

      if (passwordField.type === "password") {
        passwordField.type = "text";
      } else {
        passwordField.type = "password";
      }

    }

  </script>

</body>
</html>
